server {
    listen 443;
    listen [::]:443;

    server_name authentik.login.no;
    include snippets/errors.conf;

    log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;

    location = /.well-known/openid-configuration/application/o/s3 {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84/application/o/s3/.well-known/openid-configuration;
    }

    location = /.well-known/openid-configuration/application/o/s3/ {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84/application/o/s3/.well-known/openid-configuration;
    }

    location / {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84;
    }
}

server {
