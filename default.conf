}

server {
    listen 443;
    listen [::]:443;

    server_name spaces.login.no;
    include snippets/errors.conf;

    client_max_body_size 0;

    log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;

    location = / {
        if ($vpn = 0) {
            return 407;
        }

        if ($has_authorization = 0) {
            return 302 https://spaces.login.no/rustfs/admin/v3/oidc/authorize/default?redirect_after=/rustfs/console/;
        }

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://localhost:9101;
        include snippets/proxy-headers.conf;
    }

    location ~ ^/rustfs/console/auth/(login|key-login|sts-login)/?$ {
        if ($vpn = 0) {
            return 407;
        }

        return 302 https://spaces.login.no/rustfs/admin/v3/oidc/authorize/default?redirect_after=/rustfs/console/;
    }

    location / {
        if ($vpn = 0) {
            return 407;
        }

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://localhost:9101;
        include snippets/proxy-headers.conf;
    }
}

